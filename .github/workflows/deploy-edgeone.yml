name: Deploy to EdgeOne

on:
  push:
    branches:
      - main
    paths:
      - 'website/**'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Tencent Cloud EdgeOne
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: website/package-lock.json
      
      - name: Install dependencies
        working-directory: ./website
        run: npm ci
      
      - name: Build
        working-directory: ./website
        run: npm run build
      
      - name: Deploy to EdgeOne
        uses: TencentCloud/edgeone-deploy-action@v1
        with:
          secret-id: ${{ secrets.TENCENT_SECRET_ID }}
          secret-key: ${{ secrets.TENCENT_SECRET_KEY }}
          area-id: ${{ secrets.EDGEONE_AREA_ID }}
          zone: ${{ secrets.EDGEONE_ZONE }}
          src-path: ./website/dist
          dist-path: /
